name: Deploy Theme

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: wp-content/themes/weerts/pnpm-lock.yaml

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          tools: composer:v2

      - name: Install dependencies
        working-directory: wp-content/themes/weerts
        run: pnpm install --frozen-lockfile

      - name: Install PHP dependencies
        working-directory: wp-content/themes/weerts
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Build theme assets
        working-directory: wp-content/themes/weerts
        run: pnpm build

      - name: Deploy via rsync
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

          THEME_PATH="${{ secrets.SSH_PATH }}"
          THEMES_DIR="$(dirname "${THEME_PATH%/}")"
          WP_CONTENT_DIR="$(dirname "$THEMES_DIR")"
          PLUGINS_PATH="$WP_CONTENT_DIR/plugins"
          UPLOADS_PATH="$WP_CONTENT_DIR/uploads"

          ssh -p "${{ secrets.SSH_PORT }}" -i ~/.ssh/id_ed25519 \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "mkdir -p '${{ secrets.SSH_PATH }}' '$PLUGINS_PATH' '$UPLOADS_PATH'"

          rsync -az --delete \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            --exclude node_modules \
            --exclude .git \
            --exclude .github \
            wp-content/themes/weerts/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.SSH_PATH }}"

          rsync -az \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            --exclude node_modules \
            --exclude .git \
            --exclude .github \
            wp-content/plugins/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$PLUGINS_PATH/"

          rsync -az \
            -e "ssh -p ${{ secrets.SSH_PORT }} -i ~/.ssh/id_ed25519" \
            --exclude .git \
            --exclude .github \
            wp-content/uploads/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:$UPLOADS_PATH/"
